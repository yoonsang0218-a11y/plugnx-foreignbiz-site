const cats=["전체",...new Set(LOG.map(l=>l.cat))];
// legend
document.getElementById("legend").innerHTML=Object.entries(C).filter(([k])=>cats.includes(k)).map(([k,v])=>`<span><b style="color:${v}">●</b> ${k}</span>`).join("");
document.getElementById("cnt").textContent=LOG.length;
const fbar=document.getElementById("filters");
cats.forEach((c,i)=>{const s=document.createElement("span");s.className="chip"+(i===0?" on":"");s.textContent=c+(c==="전체"?` (${LOG.length})`:` (${LOG.filter(l=>l.cat===c).length})`);
  s.onclick=()=>{document.querySelectorAll("#filters .chip").forEach(x=>x.classList.remove("on"));s.classList.add("on");render(c);};fbar.appendChild(s);});
const tl=document.getElementById("tl");
function render(filter){
  tl.innerHTML="";
  LOG.filter(l=>filter==="전체"||l.cat===filter).forEach(l=>{
    const col=C[l.cat]||"var(--blue)";
    const work=l.work.map(w=>`<li>${w}</li>`).join("");
    const arts=(l.result||[]).map(a=>a.u?`<a class="art" href="${a.u}" ${a.u.startsWith('http')?'target="_blank" rel="noopener"':''}>${a.t}</a>`:`<span class="art" style="opacity:.6;cursor:default">${a.t}</span>`).join("");
    const el=document.createElement("div");el.className="ph open";el.style.setProperty("--c",col);
    el.innerHTML=`<div class="dot"></div><div class="box">
      <div class="hd" onclick="this.parentElement.parentElement.classList.toggle('open')">
        <span class="step">${l.step}</span><span class="ttl">${l.title||l.prompt.slice(0,22)+(l.prompt.length>22?'…':'')}</span>
        <span class="cat">${l.cat}</span></div>
      <div class="body">
        <div class="prompt"><span class="who">📝 요청</span><span>${l.prompt}</span></div>
        <div class="lab">한 일</div><ul>${work}</ul>
        ${arts?`<div class="lab">결과물</div><div class="arts">${arts}</div>`:""}
      </div></div>`;
    tl.appendChild(el);
  });
}
render("전체");
let allOpen=true;
document.getElementById("toggleAll").onclick=function(){
  allOpen=!allOpen;
  document.querySelectorAll(".ph").forEach(p=>p.classList.toggle("open",allOpen));
  this.textContent=allOpen?"⊖ 전체 접기":"⊕ 전체 펼치기";
};
